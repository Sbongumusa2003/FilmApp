<ion-header>
  <ion-toolbar>
    <ion-title>Search Movies</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="logout()" fill="clear" color="medium">
        <ion-icon name="log-out-outline" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="search-content">
  <div class="search-bar-container">
    <ion-searchbar
      [(ngModel)]="searchQuery"
      placeholder="Search movies..."
      (keyup.enter)="searchMovies()"
      (ionClear)="clearSearch()"
      animated>
    </ion-searchbar>
    <ion-button expand="block" (click)="searchMovies()" class="search-btn">
      Search
    </ion-button>
  </div>

  <p class="results-count" *ngIf="hasSearched">
    {{ filteredMovies.length }} result{{ filteredMovies.length !== 1 ? 's' : '' }}
    <span *ngIf="searchQuery"> for "{{ lastQuery }}"</span>
  </p>

  <div class="filter-bar" *ngIf="movies.length > 0">
    <ion-searchbar
      [(ngModel)]="filterQuery"
      placeholder="Filter results..."
      (ionInput)="filterResults($event)"
      animated
      debounce="200">
    </ion-searchbar>
  </div>

  <ion-grid *ngIf="filteredMovies.length > 0">
    <ion-row>
      <ion-col size="6" *ngFor="let movie of filteredMovies">
        <div class="movie-card" (click)="goToDetail(movie)">
          <div class="poster-wrapper">
            <img
              [src]="movie['#IMG_POSTER'] || 'assets/no-poster.png'"
              [alt]="movie['#TITLE']"
              class="movie-poster"
              (error)="$any($event.target).src='assets/no-poster.png'"
            />
          </div>
          <div class="movie-info">
            <p class="movie-title">{{ movie['#TITLE'] }}</p>
            <p class="movie-year">{{ movie['#YEAR'] }}</p>
          </div>
        </div>
      </ion-col>
    </ion-row>
  </ion-grid>

  <div class="empty-state" *ngIf="hasSearched && filteredMovies.length === 0 && !isLoading">
    <ion-icon name="film-outline"></ion-icon>
    <p>No movies found.</p>
    <p class="sub">Try a different search term.</p>
  </div>

  <div class="initial-state" *ngIf="!hasSearched">
    <ion-icon name="search-outline"></ion-icon>
    <p>Search for movies to get started.</p>
  </div>
</ion-content>
